name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy coordinator script to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: 167.71.80.41
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "agent-coordinator.sh"
          target: "/root/"

      - name: Deploy app to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.71.80.41
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/app
            git pull
            npm run build
            pm2 restart hs-navigator
            chmod +x /root/agent-coordinator.sh
            pm2 restart agent-coordinator
