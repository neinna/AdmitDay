name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.71.80.41
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/app
            git pull
            npm run build
            pm2 restart hs-navigator
