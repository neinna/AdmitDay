name: Deploy to VPS

# Auto-deploy to the VPS is retired — the app is hosted on Vercel, which deploys
# automatically on push. This workflow is kept for manual, on-demand VPS deploys
# only (Actions tab → Run workflow). To re-enable auto-deploy, restore the
# `push` trigger below.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Set up Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Copy coordinator script to VPS
        uses: appleboy/scp-action@8a92fcdb1eb4ffbf538b2fa286739760aac8a95b # v0.1.4
        with:
          host: 167.71.80.41
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "agent-coordinator.sh"
          target: "/root/"

      - name: Deploy app to server
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: 167.71.80.41
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/app
            git pull
            npm install
            npx ts-node --compiler-options '{"module":"commonjs","moduleResolution":"node"}' --transpile-only scripts/embed-schools.ts
            npm run build
            pm2 restart hs-navigator
            chmod +x /root/agent-coordinator.sh
            pm2 restart agent-coordinator
